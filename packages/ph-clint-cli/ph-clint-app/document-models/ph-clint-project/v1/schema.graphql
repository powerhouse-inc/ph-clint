type PhClintProjectState {
  name: String
  scope: String
  version: String!
  description: String!
  features: PhClintFeatures!
  packages: [PowerhousePackage!]!
  externalSkills: [ExternalSkill!]!
  publishHistory: [PublishRecord!]!
  deployment: PhClintDeployment!
}

type PhClintFeatures {
  powerhouse: PowerhouseLevel!
  mastra: PhClintMastraFeature!
  routine: PhClintRoutineFeature!
}

enum PowerhouseLevel {
  Disabled
  Reactor
  Switchboard
  Connect
}

type PhClintMastraFeature {
  enabled: Boolean!
  agentId: String
  agentName: String
  agentDescription: String
  agentImage: String
  models: [PhClintAgentModel!]!
  profiles: [PhClintAgentProfile!]!
  common: PhClintMastraCommon!
}

type PhClintMastraCommon {
  enableChat: Boolean!
}

type PhClintAgentModel {
  id: String!
  isDefault: Boolean!
}

type PhClintAgentProfile {
  id: String!
  title: String!
  content: String!
}

type PhClintRoutineFeature {
  enabled: Boolean!
}

type PowerhousePackage {
  id: OID!
  packageName: String!
  documentTypes: [String!]!
  version: String
  managed: Boolean!
}

type ExternalSkill {
  id: OID!
  name: String!
  githubUrl: URL!
}

enum PublishTag {
  Dev
  Staging
  Production
}

enum PublishStatus {
  Pending
  InProgress
  Succeeded
  Failed
}

type PublishRecord {
  id: OID!
  tag: PublishTag!
  version: String!
  timestamp: DateTime!
  status: PublishStatus!
}

type PhClintDeployment {
  proxyEnabled: Boolean!
  supportedResources: [String!]!
}

# identity

input SetDescriptionInput {
  description: String!
}

input SetVersionInput {
  version: String!
}

input SetPackageIdentifierInput {
  identifier: String!
}

# features_powerhouse

input SetPowerhouseLevelInput {
  level: PowerhouseLevel!
  skipAutoProxy: Boolean
}

# features_mastra

input EnableMastraInput {
  agentId: String!
  agentName: String!
}

input DisableMastraInput {
  _: Boolean
}

input SetAgentIdInput {
  agentId: String!
}

input SetAgentNameInput {
  agentName: String!
}

input AddModelInput {
  id: String!
  isDefault: Boolean
}

input RemoveModelInput {
  id: String!
}

input SetDefaultModelInput {
  id: String!
}

input AddProfileInput {
  id: String!
  title: String!
  content: String!
  insertBefore: String
}

input UpdateProfileInput {
  id: String!
  title: String
  content: String
}

input RemoveProfileInput {
  id: String!
}

input ReorderProfilesInput {
  ids: [String!]!
  insertBefore: String
}

input SetAgentDescriptionInput {
  description: String!
}

input SetAgentImageInput {
  image: String!
}

input ClearAgentImageInput {
  _: Boolean
}

input SetEnableChatInput {
  enabled: Boolean!
}

# features_routine

input EnableRoutineInput {
  _: Boolean
}

input DisableRoutineInput {
  _: Boolean
}

# powerhouse_packages

input AddPowerhousePackageInput {
  id: OID!
  packageName: String!
}

input RemovePowerhousePackageInput {
  id: OID!
}

input AddPackageDocumentTypeInput {
  packageId: OID!
  documentType: String!
}

input RemovePackageDocumentTypeInput {
  packageId: OID!
  documentType: String!
}

input SetPackageVersionInput {
  packageId: OID!
  version: String
}

# external_skills

input AddExternalSkillInput {
  id: OID!
  name: String!
  githubUrl: URL!
}

input RemoveExternalSkillInput {
  id: OID!
}

input SetExternalSkillNameInput {
  id: OID!
  name: String!
}

input SetExternalSkillGithubUrlInput {
  id: OID!
  githubUrl: URL!
}

# publishing

input BumpVersionInput {
  version: String!
}

input PublishDevInput {
  id: OID!
  timestamp: DateTime!
}

input PublishStagingInput {
  id: OID!
  timestamp: DateTime!
}

input PublishProductionInput {
  id: OID!
  timestamp: DateTime!
}

input SetPublishStatusInput {
  id: OID!
  status: PublishStatus!
}

# lifecycle

input ImportSpecInput {
  name: String!
  scope: String
  version: String!
  description: String!
  powerhouse: PowerhouseLevel!
  mastraEnabled: Boolean!
  routineEnabled: Boolean!
  packages: [ImportPackageInput!]!
  externalSkills: [ImportSkillInput!]!
  agentId: String
  agentName: String
  models: [ImportModelInput!]
  profiles: [ImportProfileInput!]
  agentDescription: String
  agentImage: String
  enableChat: Boolean
  proxyEnabled: Boolean
  supportedResources: [String!]
}

input ImportPackageInput {
  id: OID!
  packageName: String!
  documentTypes: [String!]!
  version: String
}

input ImportSkillInput {
  id: OID!
  name: String!
  githubUrl: URL!
}

input ImportModelInput {
  id: String!
  isDefault: Boolean!
}

input ImportProfileInput {
  id: String!
  title: String!
  content: String!
}

# deployment

input AddSupportedResourceInput {
  resource: String!
}

input RemoveSupportedResourceInput {
  resource: String!
}

input SetProxyEnabledInput {
  enabled: Boolean!
}