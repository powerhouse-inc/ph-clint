type PhClintProjectState {
  name: String
  scope: String
  version: String!
  description: String!
  bin: String
  features: PhClintFeatures!
}

type PhClintFeatures {
  powerhouse: PhClintPowerhouseFeature!
  mastra: PhClintMastraFeature!
  routine: PhClintRoutineFeature!
}

type PhClintPowerhouseFeature {
  enabled: Boolean!
  switchboard: Boolean!
  connect: Boolean!
}

type PhClintMastraFeature {
  enabled: Boolean!
}

type PhClintRoutineFeature {
  enabled: Boolean!
}


