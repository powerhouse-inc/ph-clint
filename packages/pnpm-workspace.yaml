packages:
  - 'ph-clint'
  - 'ph-clint-dev'
  - 'ph-clint-observability'
  - 'ph-clint-cli/ph-clint-app'
  - 'ph-clint-cli/ph-clint-cli'
  - 'clint-common'

overrides:
  'mastra>@mastra/deployer': '1.41.0'
  zod: '4.3.6'

# Single source of truth for versions shared across workspace packages.
# Referenced from package.json as `"<dep>": "catalog:"`. Note: peerDependencies
# are intentionally left as literal ranges (the publish tooling pins catalog
# deps to an exact version, which would wrongly narrow a peer range like
# `@mastra/core: ^1.41.0`).
catalog:
  # Mastra — the agent-framework trio, kept on one verified minor set.
  '@mastra/core': ^1.41.0
  '@mastra/libsql': ^1.12.1
  '@mastra/memory': ^1.20.2
  '@powerhousedao/reactor-attachments': 6.2.0-dev.37
  '@powerhousedao/analytics-engine-core': 6.2.0-dev.37
  '@powerhousedao/connect': 6.2.0-dev.37
  '@powerhousedao/design-system': 6.2.0-dev.37
  '@powerhousedao/document-engineering': 1.40.5
  '@powerhousedao/ph-cli': 6.2.0-dev.37
  '@powerhousedao/reactor': 6.2.0-dev.37
  '@powerhousedao/reactor-api': 6.2.0-dev.37
  '@powerhousedao/reactor-browser': 6.2.0-dev.37
  '@powerhousedao/reactor-mcp': 6.2.0-dev.37
  '@powerhousedao/shared': 6.2.0-dev.37
  '@powerhousedao/switchboard': 6.2.0-dev.37
  document-model: 6.2.0-dev.37
  # zod — unified across the workspace. Exact, to match the `overrides` pin
  # above (the override forces 4.3.6 transitively anyway).
  zod: 4.3.6

allowBuilds:
  '@apollo/protobufjs': true
  '@datadog/pprof': true
  '@parcel/watcher': true
  '@prisma/client': true
  '@prisma/engines': true
  '@sentry/cli': true
  better-sqlite3: true
  esbuild: true
  oracledb: true
  prisma: true
  protobufjs: true
  sqlite3: true
  unrs-resolver: true

minimumReleaseAgeExclude:
  - '@powerhousedao/*'
  - '@renown/*'
  - document-model
