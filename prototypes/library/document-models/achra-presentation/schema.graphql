}

type ProcessStep {
  id: OID!
  title: String!
  description: String
}

type AgendaItem {
  id: OID!
  title: String!
}

type MilestoneItem {
  id: OID!
  period: String!
  title: String!
  description: String
}

type BulletColumn {
  title: String
  bulletItems: [TextItem!]!
}

type ChecklistItem {
  id: OID!
  text: String!
  checked: Boolean!
}

type IconListItem {
  id: OID!
  title: String!
  description: String
}

type HighlightItem {
  id: OID!
  value: String!
