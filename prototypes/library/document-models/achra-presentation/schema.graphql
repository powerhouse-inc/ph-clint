}

type Slide {
  id: OID!
  template: SlideTemplate!
  title: String
  subtitle: String
  supertitle: String
  description: String
  footerLeft: String
  footerRight: String
  slogan: String
  quoteText: String
  speakerName: String
  speakerRole: String
  bigNumber: String
  codeContent: String
  imageUrl: String
  leftTitle: String
  leftText: String
  rightTitle: String
  rightText: String
  links: [Link!]!
  bulletItems: [TextItem!]!
  steps: [TextItem!]!
  processSteps: [ProcessStep!]!
  agendaItems: [AgendaItem!]!
  milestones: [MilestoneItem!]!
  columns: [BulletColumn!]!
  checklistItems: [ChecklistItem!]!
  iconListItems: [IconListItem!]!
  highlights: [HighlightItem!]!
}

type AchraPresentationState {
  title: String
  author: String
  date: String
  slides: [Slide!]!
}



